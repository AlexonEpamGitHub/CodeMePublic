version: '3.8'

services:
  # Wolverine Web API
  webapi-wolverine:
    build:
      context: ../..
      dockerfile: src/Web.Api.Wolverine/Dockerfile
    container_name: wolverine-api
    ports:
      - "5100:8080"
      - "5101:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080;https://+:8081
      - ConnectionStrings__Database=Server=sqlserver;Database=AuditLog;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
    depends_on:
      - sqlserver
      - seq
    networks:
      - wolverine-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # SQL Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: wolverine-sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - wolverine-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Seq - Structured logging
  seq:
    image: datalust/seq:latest
    container_name: wolverine-seq
    ports:
      - "5341:80"
    environment:
      - ACCEPT_EULA=Y
    volumes:
      - seq-data:/data
    networks:
      - wolverine-network

volumes:
  sqlserver-data:
    driver: local
  seq-data:
    driver: local

networks:
  wolverine-network:
    driver: bridge
